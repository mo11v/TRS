## JAM Platform — GitHub Actions CI/CD
## بيشتغل عند كل push على main branch
## بيعمل: syntax check → test → notify Render

name: JAM Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  ## ══════════════════════════════════════
  ## JOB 1: Syntax & Import Check
  ## ══════════════════════════════════════
  syntax-check:
    name: 🔍 Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile database/db.py
          python -m py_compile config/settings.py
          python -m py_compile services/auth_service.py
          python -m py_compile services/rbac.py
          python -m py_compile services/firestore_service.py
          python -m py_compile services/cloudinary_service.py
          echo "✅ All files syntax OK"

      - name: Check FastAPI app loads
        run: |
          # Test app imports without starting server
          python -c "
          import os
          os.environ['TRS_DB_PATH'] = '/tmp/test_jam.db'
          os.environ['TRS_UPLOADS'] = '/tmp/test_uploads'
          from app import app
          print('✅ FastAPI app loaded OK')
          print(f'Routes: {len(app.routes)}')
          "

      - name: Check templates exist
        run: |
          python -c "
          import os
          required = [
            'login.html','dashboard.html','jobs.html','job_detail.html',
            'analysis.html','fleet.html','ai.html','scada.html',
            'devices.html','device_detail.html','users.html','settings.html','base.html'
          ]
          missing = [t for t in required if not os.path.exists(f'templates/{t}')]
          if missing:
            print(f'❌ Missing templates: {missing}')
            exit(1)
          print(f'✅ All {len(required)} templates present')
          "

  ## ══════════════════════════════════════
  ## JOB 2: Security Check
  ## ══════════════════════════════════════
  security:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    needs: syntax-check

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit (security scanner)
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r . \
            --exclude ./.venv,./venv \
            -ll \
            --skip B101,B110,B311 \
            -q || true
          echo "✅ Security scan complete"

      - name: Check no hardcoded secrets
        run: |
          python -c "
          import re, os, sys
          PATTERNS = [
            r'password\s*=\s*[\"'][^\"']{8,}[\"']',
            r'secret\s*=\s*[\"'][^\"']{16,}[\"']',
            r'AIzaSy[A-Za-z0-9_-]{33}',   # Firebase API key
          ]
          found = []
          for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in ['.git','__pycache__','venv','.venv']]
            for f in files:
              if f.endswith('.py'):
                path = os.path.join(root, f)
                content = open(path).read()
                for pat in PATTERNS:
                  if re.search(pat, content, re.I):
                    found.append(f'{path}: {pat[:30]}')
          if found:
            print('⚠️  Possible hardcoded secrets (review):')
            for f in found: print(f'  {f}')
          else:
            print('✅ No hardcoded secrets detected')
          "

  ## ══════════════════════════════════════
  ## JOB 3: Deploy notification (Render auto-deploys)
  ## ══════════════════════════════════════
  notify-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [syntax-check, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Notify deploy
        run: |
          echo "✅ All checks passed"
          echo "🚀 Render will auto-deploy from this push"
          echo "🌐 URL: https://jam-platform.onrender.com"
          echo "📊 Health: https://jam-platform.onrender.com/api/status"

      ## Optional: Trigger Render deploy hook
      ## Uncomment after adding RENDER_DEPLOY_HOOK secret in GitHub
      # - name: Trigger Render Deploy
      #   run: |
      #     curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
