services:
  trs-platform:
    build: ..
    container_name: trs-platform
    ports:
      - "8000:10000"
    env_file:
      - ../.env
    volumes:
      - trs_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  trs_data:
